services:
  backend:
    build: ./backend
    init: true
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    working_dir: /app
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
